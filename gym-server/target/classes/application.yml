server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/gym_management?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 你的MySQL密码
    driver-class-name: com.mysql.cj.jdbc.Driver

  # Redis配置 - 可选配置
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0
        shutdown-timeout: 100ms

  # 缓存配置 - 使用CompositeCacheManager，优先使用Redis，回退到ConcurrentHashMap
  cache:
    type: redis
    composite:
      cache-managers: redisCacheManager, simpleCacheManager
    redis:
      time-to-live: 3600000
      cache-null-values: false
      key-prefix: 'gym:'
      use-key-prefix: true

  sql:
    init:
      mode: never
  # 邮件配置
  mail:
    host: smtp.qq.com
    port: 465
    username: 你的QQ邮箱
    password: 你的QQ邮箱授权码
    protocol: smtp
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
            required: true
          starttls:
            enable: false
          socketFactory:
            class: javax.net.ssl.SSLSocketFactory
            port: 465
          timeout: 10000
          connectiontimeout: 10000

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
#    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl // 打印SQL语句
  mapper-locations: classpath:mapper/*.xml

jwt:
  secret: gym-management-system-secret-key-2024
  expiration: 86400000

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

#logging:
#  level:
#    com.example.gym: DEBUG
#    org.springframework.security: INFO

deepseek:
  api-key: 你的Deepseek API密钥
  base-url: https://api.deepseek.com/v4
  model: deepseek-chat
